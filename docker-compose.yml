services:
  neo4j:
    image: neo4j:5-community
    ports:
    - 7687:7687
    - 7474:7474
    environment:
    - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    - NEO4J_dbms_memory_heap_max__size=1G
    - NEO4J_dbms_memory_pagecache_size=512M
    volumes:
    - neo4j_data:/data
    healthcheck:
      test:
      - CMD-SHELL
      - cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
  weaviate:
    image: semitechnologies/weaviate:1.24.10
    ports:
    - 8080:8080
    environment:
    - QUERY_DEFAULTS_LIMIT=20
    - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
    - PERSISTENCE_DATA_PATH=/var/lib/weaviate
    - DEFAULT_VECTORIZER_MODULE=none
    volumes:
    - weaviate_data:/var/lib/weaviate
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider --tries=1 http://localhost:8080/v1/.well-known/ready || exit 1
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
  api:  
    build:
      context: .
      dockerfile: api/Dockerfile
    depends_on:
      neo4j:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    environment:
    - NEO4J_URI=bolt://neo4j:7687
    - WEAVIATE_URL=http://weaviate:8080
    - NEO4J_USER=${NEO4J_USER}
    - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    - WEB_ORIGIN=${WEB_ORIGIN}
    ports:
    - 8000:8000
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz').status==200 else 1)" || exit 1
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
    - 3000:3000
    healthcheck:
      test:
      - CMD-SHELL
      - 'node -e "require(''http'').get(''http://localhost:3000'', r => process.exit(r.statusCode < 500 ? 0 : 1)).on(''error'', () => process.exit(1))" || exit 1'
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
volumes:
  neo4j_data: null
  weaviate_data: null
